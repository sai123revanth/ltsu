<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - LTSU Punjab</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .mobile-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        @media (min-width: 480px) {
            .mobile-wrapper {
                height: 850px;
                border-radius: 2rem;
            }
        }

        .bg-gradient-mesh {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 38%;
            background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 100%);
            z-index: 0;
            border-bottom-left-radius: 4rem;
        }

        .login-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 1rem;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .login-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            transition: color 0.3s ease;
        }

        .role-switcher {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 2rem;
            position: relative;
            z-index: 10;
        }

        .role-btn {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .role-btn.active {
            background: #ffffff;
            color: #1e3a8a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            font-weight: 600;
            letter-spacing: 0.025em;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #message-box {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            transform: translateY(-150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #message-box.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <!-- Message Alert -->
        <div id="message-box" class="bg-red-50 border border-red-200 p-4 rounded-xl flex items-center gap-3 shadow-lg">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-600"></i>
            <p id="message-text" class="text-xs font-semibold text-red-800"></p>
        </div>

        <!-- Header Section -->
        <div class="bg-gradient-mesh"></div>
        
        <div class="relative z-10 flex flex-col items-center pt-12 px-8">
            <div class="bg-white p-4 rounded-3xl shadow-xl mb-6">
                <img src="ltsu.webp" alt="LTSU Logo" class="h-14 w-auto object-contain" onerror="this.src='https://via.placeholder.com/200x80?text=LTSU+PUNJAB'">
            </div>
            
            <h1 class="text-white text-2xl font-bold tracking-tight mb-2">Welcome Back</h1>
            <p id="sub-heading" class="text-blue-100/70 text-sm mb-8">Login to your student account</p>

            <div class="role-switcher w-full max-w-[280px]">
                <button onclick="switchRole('student')" id="btn-student" class="role-btn active">
                    <i data-lucide="user" class="w-4 h-4"></i>
                    Student
                </button>
                <button onclick="switchRole('teacher')" id="btn-teacher" class="role-btn">
                    <i data-lucide="graduation-cap" class="w-4 h-4"></i>
                    Teacher
                </button>
            </div>
        </div>

        <!-- Login Form -->
        <div class="relative z-10 flex-1 bg-white px-8 pt-2">
            <div class="space-y-1">
                <label id="id-label" class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Student ID</label>
                <div class="input-group">
                    <input type="text" id="user-id" class="login-input" placeholder="Enter ID">
                    <i data-lucide="user" class="input-icon w-5 h-5"></i>
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Password</label>
                    <button class="text-xs font-semibold text-blue-600 hover:text-blue-700">Forgot?</button>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="login-input" placeholder="Enter Password">
                    <i data-lucide="lock" class="input-icon w-5 h-5"></i>
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 focus:outline-none">
                        <i id="eye-icon" data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-2 mb-8 ml-1">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                <label for="remember" class="text-sm text-slate-600 font-medium">Keep me signed in</label>
            </div>

            <button id="login-btn" class="btn-primary mb-8" onclick="handleLogin()">
                <span id="btn-text">Sign In</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>

            <!-- Bottom Support Links -->
            <div class="text-center space-y-4">
                <div class="flex items-center justify-center gap-2">
                    <span class="w-8 h-[1px] bg-slate-200"></span>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Support</span>
                    <span class="w-8 h-[1px] bg-slate-200"></span>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                        <i data-lucide="help-circle" class="w-4 h-4"></i>
                        Help Desk
                    </button>
                    <button class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                        <i data-lucide="globe" class="w-4 h-4"></i>
                        Website
                    </button>
                </div>
            </div>
        </div>

        <div class="p-8 text-center bg-slate-50">
            <p class="text-[10px] text-slate-400 font-medium tracking-wide uppercase">
                &copy; 2026 LAMRIN TECH SKILLS UNIVERSITY PUNJAB <br>
                <span class="text-slate-500 font-bold">Powered by University School of Engineering</span>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const SCRIPT_URL = "YOUR_DEPLOYED_WEB_APP_URL_HERE";
        let currentRole = 'student';

        // Check if user is already remembered
        window.onload = function() {
            const rememberedUser = localStorage.getItem('ltsu_user_session');
            const sessionUser = sessionStorage.getItem('ltsu_user_session');
            if (rememberedUser || sessionUser) {
                window.location.href = 'index.html';
            }
        };

        function switchRole(role) {
            currentRole = role;
            const studentBtn = document.getElementById('btn-student');
            const teacherBtn = document.getElementById('btn-teacher');
            const subHeading = document.getElementById('sub-heading');
            const idLabel = document.getElementById('id-label');

            if (role === 'student') {
                studentBtn.classList.add('active');
                teacherBtn.classList.remove('active');
                subHeading.innerText = 'Login to your student account';
                idLabel.innerText = 'Student ID';
            } else {
                teacherBtn.classList.add('active');
                studentBtn.classList.remove('active');
                subHeading.innerText = 'Login to teacher portal';
                idLabel.innerText = 'Faculty ID';
            }
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function showMessage(text) {
            const box = document.getElementById('message-box');
            const textEl = document.getElementById('message-text');
            textEl.innerText = text;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 4000);
        }

        async function handleLogin() {
            const id = document.getElementById('user-id').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');

            if (!id || !password) {
                showMessage("Please enter both ID and Password");
                return;
            }

            if (SCRIPT_URL === "YOUR_DEPLOYED_WEB_APP_URL_HERE") {
                showMessage("Please deploy the Apps Script first.");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "Verifying...";
            spinner.classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id, password, role: currentRole })
                });

                const result = await response.json();

                if (result.success) {
                    const sessionData = JSON.stringify(result.user);
                    if (remember) {
                        localStorage.setItem('ltsu_user_session', sessionData);
                    } else {
                        sessionStorage.setItem('ltsu_user_session', sessionData);
                    }
                    window.location.href = 'index.html';
                } else {
                    showMessage(result.message || "Invalid credentials");
                }
            } catch (error) {
                showMessage("Connection error. Please try again later.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Sign In";
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
