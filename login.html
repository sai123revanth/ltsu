<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // AUTHENTICATION GUARD
        (function() {
            const session = localStorage.getItem('ltsu_user_session') || sessionStorage.getItem('ltsu_user_session');
            if (!session) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LTSU Punjab - Student Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e7eb; margin: 0; display: flex; justify-content: center; }
        .mobile-wrapper { width: 100%; max-width: 480px; min-height: 100vh; background-color: #F8FAFC; box-shadow: 0 0 40px rgba(0,0,0,0.08); position: relative; }
        .header-bg { background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 100%); position: relative; overflow: hidden; padding-top: calc(1.5rem + env(safe-area-inset-top)); }
        .header-bg::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 24px 24px; opacity: 0.7; z-index: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-card { background: #ffffff; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); border: 1px solid rgba(226, 232, 240, 0.8); transition: all 0.2s ease; }
        .app-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06); border-color: rgba(203, 213, 225, 1); }
        .app-card:active { transform: scale(0.96); }
        .section-badge { background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="mobile-wrapper flex flex-col no-scrollbar">
        
        <!-- Header Section -->
        <div class="header-bg text-white pb-8 shrink-0 rounded-b-3xl shadow-md">
            <div class="flex justify-between items-center px-6 mb-8 relative z-10">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center backdrop-blur-md border border-white/20">
                        <i data-lucide="graduation-cap" class="w-5 h-5 text-blue-100"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-wide">LTSU Punjab</h1>
                </div>
                <button onclick="handleLogout()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md border border-white/20 hover:bg-red-500/20 transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex items-center gap-5 px-6 relative z-10">
                <div class="w-[76px] h-[76px] rounded-2xl bg-gradient-to-br from-blue-100 to-yellow-100 flex items-end justify-center overflow-hidden shrink-0 shadow-lg border-2 border-white/20">
                    <svg viewBox="0 0 100 100" class="w-[64px] h-[64px] drop-shadow-md">
                        <path d="M 25 45 Q 50 15 75 45 L 75 60 Q 50 75 25 60 Z" fill="#334155" />
                        <circle cx="50" cy="45" r="20" fill="#FDE047" />
                        <path d="M 27 45 Q 50 25 73 45 Q 50 20 27 45 Z" fill="#1E293B" />
                        <rect x="42" y="55" width="16" height="15" fill="#FEF08A" />
                        <path d="M 15 100 Q 50 60 85 100 Z" fill="#2563EB" />
                        <path d="M 42 70 L 50 82 L 58 70 Z" fill="#1D4ED8" />
                    </svg>
                </div>
                <div class="flex flex-col">
                    <h2 class="text-[16px] font-bold mb-1.5 leading-tight" id="profile-name">Venkata Sai Revanth</h2>
                    <div class="text-[12px] text-blue-100/80 leading-[1.5] font-normal">
                        <p class="flex items-center gap-1.5"><i data-lucide="fingerprint" class="w-3 h-3"></i> <span id="profile-id">24100010117</span></p>
                        <p class="flex items-center gap-1.5"><i data-lucide="book-open" class="w-3 h-3"></i> B.Tech CSE (AI & ML)</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Body Content -->
        <div class="flex-1 overflow-y-auto no-scrollbar p-5 pb-10 space-y-8 -mt-4 relative z-20">
            
            <!-- ATTENDANCE -->
            <div>
                <div class="flex items-center mb-4">
                    <div class="section-badge flex items-center gap-2 px-3 py-1.5 rounded-full">
                        <i data-lucide="clipboard-list" class="w-4 h-4 text-emerald-600"></i>
                        <span class="text-slate-700 text-[11px] font-bold uppercase tracking-wider">Attendance</span>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3.5">
                    <div class="app-card rounded-2xl p-3 flex flex-col items-center justify-center gap-2 h-[105px] cursor-pointer">
                        <i data-lucide="users" class="w-6 h-6 text-blue-600"></i>
                        <span class="text-[11px] text-center font-medium">Subject Wise</span>
                    </div>
                    <div class="app-card rounded-2xl p-3 flex flex-col items-center justify-center gap-2 h-[105px] cursor-pointer">
                        <i data-lucide="calendar-check" class="w-6 h-6 text-teal-600"></i>
                        <span class="text-[11px] text-center font-medium">Daily</span>
                    </div>
                </div>
            </div>

            <!-- TIME TABLE -->
            <div>
                <div class="flex items-center mb-4">
                    <div class="section-badge flex items-center gap-2 px-3 py-1.5 rounded-full">
                        <i data-lucide="calendar-clock" class="w-4 h-4 text-indigo-600"></i>
                        <span class="text-slate-700 text-[11px] font-bold uppercase tracking-wider">Time Table</span>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-3">
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="clock" class="w-7 h-7 text-indigo-500"></i>
                        <span class="text-[10px] text-center font-medium">Classes</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="calendar-days" class="w-7 h-7 text-purple-500"></i>
                        <span class="text-[10px] text-center font-medium">Exams</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="file-question" class="w-7 h-7 text-orange-500"></i>
                        <span class="text-[10px] text-center font-medium">Papers</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="bell-ring" class="w-7 h-7 text-cyan-500"></i>
                        <span class="text-[10px] text-center font-medium">Alerts</span>
                    </div>
                </div>
            </div>

            <!-- ACADEMICS -->
            <div>
                <div class="flex items-center mb-4">
                    <div class="section-badge flex items-center gap-2 px-3 py-1.5 rounded-full">
                        <i data-lucide="graduation-cap" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-slate-700 text-[11px] font-bold uppercase tracking-wider">Academics</span>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-3">
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="book-open" class="w-7 h-7 text-fuchsia-600"></i>
                        <span class="text-[10px] text-center font-medium">Syllabus</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="folder-open" class="w-7 h-7 text-red-500"></i>
                        <span class="text-[10px] text-center font-medium">Docs</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="file-text" class="w-7 h-7 text-rose-500"></i>
                        <span class="text-[10px] text-center font-medium">E-Books</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="pen-tool" class="w-7 h-7 text-emerald-500"></i>
                        <span class="text-[10px] text-center font-medium">Assignments</span>
                    </div>
                </div>
            </div>

            <!-- OTHERS -->
            <div>
                <div class="flex items-center mb-4">
                    <div class="section-badge flex items-center gap-2 px-3 py-1.5 rounded-full">
                        <i data-lucide="layout-grid" class="w-4 h-4 text-slate-600"></i>
                        <span class="text-slate-700 text-[11px] font-bold uppercase tracking-wider">Others</span>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-3">
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="ticket" class="w-7 h-7 text-amber-500"></i>
                        <span class="text-[10px] text-center font-medium">Gate Pass</span>
                    </div>
                    <div class="app-card rounded-2xl p-2 flex flex-col items-center justify-center gap-2 h-[96px] cursor-pointer">
                        <i data-lucide="building-2" class="w-7 h-7 text-pink-600"></i>
                        <span class="text-[10px] text-center font-medium">Hostel</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
        window.onload = function() {
            const userData = JSON.parse(localStorage.getItem('ltsu_user_session') || sessionStorage.getItem('ltsu_user_session'));
            if (userData) {
                document.getElementById('profile-id').innerText = userData.id;
                document.getElementById('profile-name').innerText = userData.name || "User";
            }
        };
        function handleLogout() {
            localStorage.removeItem('ltsu_user_session');
            sessionStorage.removeItem('ltsu_user_session');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
